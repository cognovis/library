version: 1
capabilities:
  - name: read_files
    description: Read project files and search local source trees.
    claude:
      tools: [Read, Grep, Glob]
    codex:
      sandbox_mode: read-only
  - name: search_files
    description: Search local source trees without modifying files.
    claude:
      tools: [Grep, Glob]
    codex:
      sandbox_mode: read-only
  - name: write_files
    description: Create new files in the workspace.
    claude:
      tools: [Write]
    codex:
      sandbox_mode: workspace-write
  - name: edit_files
    description: Modify existing files in the workspace.
    claude:
      tools: [Edit]
    codex:
      sandbox_mode: workspace-write
  - name: run_shell
    description: Run shell commands in the workspace.
    claude:
      tools: [Bash]
    codex:
      sandbox_mode: workspace-write
  - name: bash_read_only
    description: Run read-only shell commands for inspection and local analysis.
    claude:
      tools: [Bash]
    codex:
      sandbox_mode: read-only
  - name: inspect_git
    description: Inspect git status, diffs, history, and branch metadata.
    claude:
      tools: [Bash, Read, Grep, Glob]
      mcpServers: [cognovis-tools]
    codex:
      mcp_servers: [cognovis-tools]
      sandbox_mode: read-only
  - name: spawn_subagents
    description: Delegate bounded work to harness-native subagents.
    claude:
      tools: [Agent]
    codex:
      sandbox_mode: workspace-write
  - name: query_memory
    description: Query and update the open-brain project memory.
    claude:
      tools:
        - mcp__open-brain__save_memory
        - mcp__open-brain__search
        - mcp__open-brain__timeline
        - mcp__open-brain__get_context
      mcpServers: [open-brain]
    codex:
      mcp_servers: [open-brain]
      skills: [ob-cli]
      sandbox_mode: workspace-write
  - name: search_web
    description: Search and fetch web content for research tasks.
    claude:
      tools: [WebFetch, WebSearch]
      mcpServers: [searxng]
    codex:
      mcp_servers: [searxng]
      sandbox_mode: read-only
  - name: read_external_registries
    description: Inspect package, implementation-guide, and other public registry metadata.
    claude:
      tools: [Bash, WebFetch, WebSearch]
      mcpServers: [searxng]
    codex:
      mcp_servers: [searxng]
      sandbox_mode: read-only
  - name: search_searxng
    description: Search web content through the SearXNG MCP server without built-in web tools.
    claude:
      tools: [mcp__searxng__searxng_web_search]
      mcpServers: [searxng]
    codex:
      mcp_servers: [searxng]
      sandbox_mode: read-only
  - name: use_skills
    description: Invoke harness-native skills from an agent workflow.
    claude:
      tools: [Skill]
    codex:
      sandbox_mode: read-only
  - name: query_executive_library
    description: Query the Executive Circle content archive.
    claude:
      mcpServers: [executive-circle]
    codex:
      mcp_servers: [executive-circle]
      sandbox_mode: read-only
  - name: refine_prompts
    description: Use HeyPresto prompt refinement capability.
    claude:
      mcpServers: [heypresto]
    codex:
      mcp_servers: [heypresto]
      sandbox_mode: read-only
  - name: browser
    description: Drive browser automation for local or remote web targets.
    claude:
      tools: [Bash]
      mcpServers: [playwright]
    codex:
      mcp_servers: [playwright]
      sandbox_mode: workspace-write
  - name: manage_beads
    description: Full mutating beads lifecycle (read, claim, update, export, close) via typed MCP tools, for orchestration-class roles that mutate bead state; read-only consumers should use read_beads instead (ADR-0007 Phase 6).
    claude:
      tools:
        - mcp__cognovis-tools__bead_show
        - mcp__cognovis-tools__bead_ready
        - mcp__cognovis-tools__bead_list
        - mcp__cognovis-tools__bead_search
        - mcp__cognovis-tools__bead_repos
        - mcp__cognovis-tools__bead_create
        - mcp__cognovis-tools__bead_effort_classify
        - mcp__cognovis-tools__bead_claim_prepare
        - mcp__cognovis-tools__bead_claim_commit
        - mcp__cognovis-tools__bead_claim
        - mcp__cognovis-tools__bead_update
        - mcp__cognovis-tools__bead_update_notes
        - mcp__cognovis-tools__bead_review_write
        - mcp__cognovis-tools__bead_close
        - mcp__cognovis-tools__bead_dep_add
        - mcp__cognovis-tools__bead_dep_remove
        - mcp__cognovis-tools__bead_dolt_sync
      mcpServers: [cognovis-tools]
      skills: [beads]
    codex:
      mcp_servers: [cognovis-tools]
      skills: [beads]
      sandbox_mode: workspace-write
  - name: manage_agent_sessions
    description: Start, resume, inspect, and cancel role-scoped provider sessions through the typed cognovis-tools gateway.
    claude:
      tools:
        - mcp__cognovis-tools__agent_session_start
        - mcp__cognovis-tools__agent_session_continue
        - mcp__cognovis-tools__agent_session_status
        - mcp__cognovis-tools__agent_session_cancel
      mcpServers: [cognovis-tools]
    codex:
      mcp_servers: [cognovis-tools]
      sandbox_mode: workspace-write
  - name: read_beads
    description: Read-only typed access to beads issues via cognovis-tools MCP (no mutation). For non-orchestrator consumers (e.g. classifiers, pollers) that need bead visibility but must not mutate bead state.
    claude:
      tools:
        - mcp__cognovis-tools__bead_show
        - mcp__cognovis-tools__bead_ready
        - mcp__cognovis-tools__bead_list
        - mcp__cognovis-tools__bead_search
        - mcp__cognovis-tools__bead_repos
      mcpServers: [cognovis-tools]
      skills: [beads]
    codex:
      mcp_servers: [cognovis-tools]
      skills: [beads]
      sandbox_mode: read-only
  - name: update_docs
    description: Edit documentation and changelog files.
    claude:
      tools: [Read, Write, Edit, Grep, Glob]
    codex:
      sandbox_mode: workspace-write
  - name: send_email
    description: Prepare email drafts through the local mail-send workflow.
    claude:
      tools: [Bash, Read]
      skills: [mail-send]
    codex:
      skills: [mail-send]
      sandbox_mode: workspace-write
  - name: workflow
    description: Run named Claude Code workflows via the Workflow tool. Claude-only; no Codex equivalent.
    claude:
      tools: [Workflow]
    codex:
      sandbox_mode: read-only

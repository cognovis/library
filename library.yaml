default_dirs:
  skills:
    - default: .claude/skills/
    - default_codex: .agents/skills/
    - global: ~/.claude/skills/
    - global_codex: ~/.agents/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/
  guardrails:
    - default: .claude/hooks/
    - global: ~/.claude/hooks/
    - default_codex: .codex/hooks/
    - global_codex: ~/.codex/hooks/
    - default_opencode: .opencode/guardrails/

library:
  skills:
    - name: impeccable
      description: >-
        Frontend design skill (Apache-2.0, third-party). Single user-invocable
        /impeccable command with 23 sub-flows: craft, shape, audit, critique,
        polish, harden, animate, colorize, distill, optimize, adapt, and more.
        7 reference files cover typography, color, spatial design, motion,
        interaction, responsive design, and UX writing. Built on Anthropic's
        frontend-design skill with explicit anti-patterns. Use for any UI work
        in mira, polaris, or other web/app projects.
      from_marketplace: pbakaus
      repo: impeccable
      path: .claude/skills/impeccable
      harness: both
      tags:
        - third-party
        - frontend
        - design
        - ui
        - apache-2.0
    - name: agent-forge
      description: >-
        Create and review agents (subagents). Use when creating specialized AI assistants,
        reviewing/auditing existing agents, deciding between agent vs skill vs command,
        or asking about agent best practices, multi-agent pipelines, and model selection.
        MUST BE USED when the user says "create agent", "new subagent", "review agent",
        "audit agent", "agent vs skill", or asks about multi-agent architecture.
      source: https://github.com/cognovis/library-core/blob/main/.claude/skills/agent-forge/SKILL.md
      requires:
        - "prompt:english-only"
      harness: both
      tags:
        - origin:original
        - tier:core
    - name: angebotserstellung
      description: >-
        Professionelle Angebote fuer IT-Projekte und Beratungsleistungen erstellen.
        Use when writing proposals, revising offers, or calculating project pricing.
        Triggers on Angebot, proposal, Preiskalkulation, Angebotserstellung, offer, Beratungsangebot.

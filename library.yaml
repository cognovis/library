default_dirs:
  skills:
    - default: .claude/skills/
    - default_codex: .agents/skills/
    - global: ~/.claude/skills/
    - global_codex: ~/.agents/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/

library:
  skills: []
  agents: []
  prompts: []

mcp_servers:
  - name: open-brain
    description: Stateless memory store via search/save/get — persists observations across sessions
    coding_strategy: cli
    mobile_strategy: mcp
    capabilities:
      stateless: true
      streaming: false
      auth: token
    install:
      cli:
        package: '@cognovis/open-brain-cli'
        manager: npm
      mcp:
        claude_code:
          config_path: ~/.claude/settings.json
          snippet:
            type: stdio
            command: open-brain
        codex:
          config_path: ~/.codex/config.toml
          snippet:
            command: open-brain
        opencode:
          config_path: ~/.config/opencode/opencode.json
          snippet:
            command: open-brain
        claude_ai:
          install_url: https://claude.ai/add-mcp/open-brain
        claude_ios:
          install_url: https://claude.ai/add-mcp/open-brain

marketplaces:
  - name: anthropic-official
    source: https://github.com/anthropics
    description: Anthropic-curated Claude plugins and extensions
  - name: cognovis-samurai
    source: https://github.com/cognovis
    description: Cognovis Samurai skills collection
  - name: disler
    source: https://github.com/disler
    description: Public skill/agent/hooks repos for Claude Code and AI agents
  - name: thadenorigar
    source: https://github.com/ThadeNorigar
    description: Private K2SO and related agent repos

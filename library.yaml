default_dirs:
  skills:
    - default: .claude/skills/
    - default_codex: .agents/skills/
    - global: ~/.claude/skills/
    - global_codex: ~/.agents/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/
  guardrails:
    - default: .claude/hooks/
    - global: ~/.claude/hooks/
    - default_codex: .codex/hooks/
    - global_codex: ~/.codex/hooks/
    - default_opencode: .opencode/guardrails/

library:
  skills: []
  agents: []
  prompts: []

guardrails:
  - name: block-destructive-bash
    description: >-
      Blocks destructive bash commands (force-pushes, recursive deletes, DROP TABLE, etc.)
      that cannot be undone. The only deterministic safety layer — runs outside the LLM loop
      and cannot be bypassed by the model.
    purpose: pre-tool-veto
    capability:
      claude_code:
        events: [PreToolUse]
        handler: bash-script
        matcher: Bash
        note: >-
          Primary implementation. Reads $CLAUDE_TOOL_INPUT JSON, checks command string for
          destructive patterns, exits 2 to block with a message. Full PreToolUse semantics.
      codex_cli:
        events: [SessionStart]
        handler: node-mjs
        note: >-
          Codex CLI has no PreToolUse event. SessionStart hook injects a system-level
          WARNING into the session context to discourage destructive commands.
          Effectiveness is advisory, not hard-blocking.
        mismatch_warning: >-
          codex_cli supports only SessionStart/SessionEnd/Stop. The pre-tool-veto purpose
          cannot be fully enforced; this installs a SessionStart advisory instead.
      codex_cloud:
        mechanism: approval_policy
        config_key: approval_policy
        supported_values: [always, unless-allow-listed]
        recommended_value: always
        note: >-
          No event-level veto in Codex cloud. Setting approval_policy=always requires human
          approval for every tool call — blunt but effective. Alternatively configure
          sandbox_mode restrictions.
        mismatch_warning: >-
          codex_cloud has no per-tool-call hook. Installing sets approval_policy=always in
          config.toml, which requires approval for ALL tool calls (not just destructive ones).
      opencode:
        mechanism: permission-rule
        config_key: rules
        note: >-
          OpenCode permission rules in opencode.json. The fragment adds a deny rule for
          shell commands matching destructive patterns. Pre-tool gates only.
    sources:
      claude_code: guardrails/block-destructive-bash/claude-code.sh
      codex_cli: guardrails/block-destructive-bash/codex-cli.mjs
      codex_cloud: guardrails/block-destructive-bash/codex-cloud-config-fragment.toml
      opencode: guardrails/block-destructive-bash/opencode-fragment.json
    tags:
      - security
      - destructive-prevention
      - pre-tool-veto

mcp_servers:
  - name: open-brain
    description: Stateless memory store via search/save/get — persists observations across sessions
    coding_strategy: cli
    mobile_strategy: mcp
    capabilities:
      stateless: true
      streaming: false
      auth: token
    install:
      cli:
        package: '@cognovis/open-brain-cli'
        manager: npm
      mcp:
        claude_code:
          config_path: ~/.claude/settings.json
          snippet:
            type: stdio
            command: open-brain
        codex:
          config_path: ~/.codex/config.toml
          snippet:
            command: open-brain
        opencode:
          config_path: ~/.config/opencode/opencode.json
          snippet:
            command: open-brain
        claude_ai:
          install_url: https://claude.ai/add-mcp/open-brain
        claude_ios:
          install_url: https://claude.ai/add-mcp/open-brain

marketplaces:
  - name: anthropic-official
    source: https://github.com/anthropics
    description: Anthropic-curated Claude plugins and extensions
  - name: cognovis-samurai
    source: https://github.com/cognovis
    description: Cognovis Samurai skills collection
  - name: disler
    source: https://github.com/disler
    description: Public skill/agent/hooks repos for Claude Code and AI agents
  - name: thadenorigar
    source: https://github.com/ThadeNorigar
    description: Private K2SO and related agent repos

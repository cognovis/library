library:
  scripts:
  - name: refinement/bead_io
    description: Shared bead-array JSON I/O helpers for refinement scripts.
    source: https://github.com/cognovis/library-core/blob/main/scripts/refinement/bead_io.py
    language: python
    metadata:
      library:
        source_catalog: cognovis-library-core
        inventory: manual
  - name: refinement/verify-premises
    description: Verify bead premise references and linked artifacts for refinement
      workflows.
    source: https://github.com/cognovis/library-core/blob/main/scripts/refinement/verify-premises.py
    language: python
    requires:
    - script:refinement/bead_io
    metadata:
      library:
        source_catalog: cognovis-library-core
        inventory: manual
  - name: triage/audit_log
    description: Append idempotent JSONL audit rows for triage decisions.
    source: https://github.com/cognovis/library-core/blob/main/scripts/triage/audit_log.py
    language: python
    metadata:
      library:
        source_catalog: cognovis-library-core
        inventory: manual
  - name: triage/present_decisions
    description: Build AskUserQuestion payloads for batched triage decisions.
    source: https://github.com/cognovis/library-core/blob/main/scripts/triage/present_decisions.py
    language: python
    metadata:
      library:
        source_catalog: cognovis-library-core
        inventory: manual
  - name: triage/query_history
    description: Query related closed beads and memory context for triage workflows.
    source: https://github.com/cognovis/library-core/blob/main/scripts/triage/query_history.py
    language: python
    metadata:
      library:
        source_catalog: cognovis-library-core
        inventory: manual
  - name: bead-review/review-prep
    description: Deterministic pre-assembly for the bead-review workflow — skips
      cache-valid beads via the review gate and builds a context packet (plus a
      childless-epic/large-effort enrich signal) for the rest. Depends on the
      beads and bead-reviewer skills being installed (resolves their scripts at
      runtime).
    source: https://github.com/cognovis/library-core/blob/main/scripts/bead-review/review-prep.py
    language: python
    metadata:
      library:
        source_catalog: cognovis-library-core
        inventory: manual
  - name: validate-review-output
    description: Validate reviewer JSON sidecar output against review-output.schema.json.
    source: https://github.com/cognovis/library-core/blob/main/scripts/validate-review-output.py
    language: python
    metadata:
      library:
        source_catalog: cognovis-library-core
        inventory: manual
  - name: stream-review/completeness_gate
    description: Optional runtime completeness gate for stream-review cohorts; validates capability evidence against the completeness-gate schema.
    source: https://github.com/cognovis/library-core/blob/main/skills/stream-review/scripts/completeness_gate.py
    language: python
    metadata:
      library:
        source_catalog: cognovis-library-core
        inventory: manual
  skills:
  - name: pvs-schema-analysis
    description: Analyze a PVS database schema and produce an annotated JSON inventory.
      Use for MSSQL or PostgreSQL PVS onboarding, schema archaeology, and adapter planning.
      Bundles references/sql-catalog.md (read-only SQL query catalog, classification/anonymization
      rules, FHIR mapping patterns) alongside SKILL.md.
    source: https://github.com/cognovis/polaris/blob/main/.claude/skills/pvs-schema-analysis/SKILL.md
    tags:
    - origin:original
    - tier:domain
    - category:skill
    metadata:
      library:
        source_catalog: polaris
        inventory: manual
        plane: dev
  - name: impeccable
    description: 'Frontend design skill (Apache-2.0, third-party). Single user-invocable
      /impeccable command with 23 sub-flows: craft, shape, audit, critique, polish,
      harden, animate, colorize, distill, optimize, adapt, and more. 7 reference files
      cover typography, color, spatial design, motion, interaction, responsive design,
      and UX writing. Built on Anthropic''s frontend-design skill with explicit anti-patterns.
      Use for any UI work in mira, polaris, or other web/app projects.'
    from_marketplace: pbakaus
    repo: impeccable
    path: .claude/skills/impeccable
    tags:
    - third-party
    - frontend
    - design
    - ui
    - apache-2.0
  - name: agent-forge
    description: Create and review agents (subagents). Use when creating specialized
      AI assistants, reviewing/auditing existing agents, deciding between agent vs
      skill vs command, or asking about agent best practices, multi-agent pipelines,
      and model selection. MUST BE USED when the user says "create agent", "new subagent",
      "review agent", "audit agent", "agent vs skill", or asks about multi-agent architecture.
    source: https://github.com/cognovis/library/blob/main/skills/agent-forge/SKILL.md
    requires:
    - standard:agentic-primitives
    - standard:primitive-placement
    - standard:english-only
    - standard:no-emoji
    metadata:
      library:
        plane: dev
        steward: library-platform
        gascity:
          exportable: false
    tags:
    - origin:original
    - tier:core
  - name: hook-forge
    description: Create and manage Claude Code hooks across all 8 hook types. Use
      when adding automated behaviors, troubleshooting hooks, or learning best practices.
      Triggers on create hook, hook-forge, hook-creator, hooks, PreToolUse, PostToolUse,
      security hook.
    source: https://github.com/cognovis/library/blob/main/skills/hook-forge/SKILL.md
    requires:
    - standard:agentic-primitives
    - standard:primitive-placement
    - standard:english-only
    - standard:no-emoji
    metadata:
      library:
        plane: dev
        steward: library-platform
        gascity:
          exportable: false
    tags:
    - origin:original
    - tier:domain
  - name: skill-forge
    description: 'Create, validate, and audit skills (SKILL.md files). Use when creating
      a new skill, validating an existing skill for quality and extractable-code violations,
      or running a full fleet audit. Triggers on: create skill, skill-forge, new skill,
      validate skill, check skill, audit skills, skill health check, fleet quality,
      skill creation, Gas City pack metadata for skills, script declarations, provider-neutral
      skill design.'
    source: https://github.com/cognovis/library/blob/main/skills/skill-forge/SKILL.md
    requires:
    - standard:agentic-primitives
    - standard:primitive-placement
    - standard:english-only
    - standard:no-emoji
    metadata:
      library:
        plane: dev
        steward: library-platform
        gascity:
          exportable: false
    tags:
    - origin:original
    - tier:domain
  - name: script-forge
    description: Create, validate, and catalog first-class Python script primitives
      for the Library. Use when deterministic helper logic should be reusable across
      skills, agents, hooks, standards, commands, or Gas City packs. Triggers on create
      script, script-forge, first-class script, Python helper, pack command script,

default_dirs:
  skills:
    # Skills are cross-harness via a single canonical location plus a Claude
    # bridge symlink. Codex reads `~/.agents/skills/` natively (CL-603 r1 root),
    # so it does NOT need a separate install path.
    #
    # Canonical (real files)  -> .agents/skills/
    # Claude bridge (symlink) -> .claude/skills/
    # Codex                   -> reads .agents/skills/ directly, no bridge
    #
    # The canonical path is a vendored copy by default. Use `--symlink`
    # only for personal development workflows that need hot edits against
    # the Layer-B cache.
    - default: .agents/skills/                    # canonical, project-local
    - global: ~/.agents/skills/                   # canonical, user-global
    - claude_bridge: .claude/skills/              # Claude harness bridge, project-local
    - global_claude_bridge: ~/.claude/skills/     # Claude harness bridge, user-global
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
    - default_codex: .codex/agents/
    - global_codex: ~/.codex/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/
  scripts:
    - default: .agents/scripts/
    - global: ~/.agents/scripts/
  standards:
    - default: .agents/standards/
    - global: ~/.agents/standards/
  guardrails:
    - default: .claude/hooks/
    - global: ~/.claude/hooks/
    - default_codex: .codex/hooks/
    - global_codex: ~/.codex/hooks/
    - default_opencode: .opencode/guardrails/
  model_standards:
    - default: .agents/model-standards/
    - global: ~/.agents/model-standards/
  agent_bases:
    - default: .agents/agent-bases/
    - global: ~/.agents/agent-bases/

tag_vocabulary:
  - tag: judge-layer
    description: Artifacts that ship as part of the judge-layer family.
  - tag: requires-proposal
    description: Side-effecting artifacts that must emit an Action Proposal before execution.
  - tag: produces-mandate
    description: Artifacts that emit AP2-style mandate records.


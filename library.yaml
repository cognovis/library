default_dirs:
  skills:
  - default: .agents/skills/
  - global: ~/.agents/skills/
  - claude_bridge: .claude/skills/
  - global_claude_bridge: ~/.claude/skills/
  - cursor_bridge: .cursor/skills/
  - global_cursor_bridge: ~/.cursor/skills/
  agents:
  - default: .claude/agents/
  - global: ~/.claude/agents/
  - default_codex: .codex/agents/
  - global_codex: ~/.codex/agents/
  - default_opencode: .opencode/agents/
  - global_opencode: ~/.opencode/agents/
  prompts:
  - default: .claude/commands/
  - global: ~/.claude/commands/
  scripts:
  - default: .agents/scripts/
  - global: ~/.agents/scripts/
  standards:
  - default: .agents/standards/
  - global: ~/.agents/standards/
  guardrails:
  - default: .claude/hooks/
  - global: ~/.claude/hooks/
  - default_codex: .codex/hooks/
  - global_codex: ~/.codex/hooks/
  - default_opencode: .opencode/guardrails/
  model_standards:
  - default: .agents/model-standards/
  - global: ~/.agents/model-standards/
  agent_bases:
  - default: .agents/agent-bases/
  - global: ~/.agents/agent-bases/
  workflows:
  - default: .claude/workflows/
  - global: ~/.claude/workflows/
  runtime_configs:
  - default: .agents/
  - global: ~/.agents/
tag_vocabulary:
- tag: judge-layer
  description: Artifacts that ship as part of the judge-layer family.
- tag: requires-proposal
  description: Side-effecting artifacts that must emit an Action Proposal before execution.
- tag: produces-mandate
  description: Artifacts that emit AP2-style mandate records.

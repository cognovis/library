project_tooling:
- name: beads-prime
  description: bd workflow primer — auto-synced from cognovis-library at SessionStart.
    bd prime emits its content. Fleet policy, not per-project customization.
  target_kind: file
  target_path: .beads/PRIME.md
  source: prime/PRIME.md
  conditions:
  - dir_exists: .beads
  sync_strategy: overwrite_if_source_newer
  conflict_policy: canonical_wins
  consumed_by:
    tool: bd
    command: bd prime
  tags:
  - beads
  - fleet-policy
- name: beads-server-mode
  description: Ensures .beads/metadata.json has dolt_mode=server and removes stale
    embedded-mode fields (database, backend, dolt_server_port, dolt_server_user).
    Prevents journal corruption from accidental embedded-mode starts.
  target_kind: json_field_enforce
  target_path: .beads/metadata.json
  conditions:
  - file_exists: .beads/metadata.json
  sync_strategy: repair_fields
  conflict_policy: canonical_wins
  fields:
    ensure:
      dolt_mode: server
    remove:
    - database
    - backend
    - dolt_server_port
    - dolt_server_user
  tags:
  - beads
  - dolt
  - fleet-policy
- name: beads-post-commit-hook
  description: Installs .git/hooks/post-commit hook that runs `bd export` after each
    commit, keeping the beads database in sync with git history automatically.
  target_kind: git_hook
  target_path: .git/hooks/post-commit
  hook_name: post-commit
  source: prime/hooks/post-commit.sh
  conditions:
  - dir_exists: .beads
  - command_available: bd
  sync_strategy: overwrite_if_source_newer
  conflict_policy: canonical_wins
  tags:
  - beads
  - git-hooks
  - fleet-policy
- name: gitleaks-pre-push-hook
  description: Installs .git/hooks/pre-push hook that scans outgoing commits with
    gitleaks before push and chains a preserved local hook when one already exists.
  target_kind: git_hook
  target_path: .git/hooks/pre-push
  hook_name: pre-push
  source: prime/hooks/pre-push.sh
  chain_existing: true
  conditions:
  - dir_exists: .beads
  - command_available: git
  sync_strategy: overwrite_if_source_newer
  conflict_policy: canonical_wins
  tags:
  - beads
  - git-hooks
  - security
  - fleet-policy
- name: consumer-agents-gitignore-profile
  description: Consumer projects commit vendored .agents content so worktrees and
    teammates receive the same project-local skills, standards, agents, and prompts.
  target_kind: gitignore_patch
  target_path: .gitignore
  profiles:
  - consumer
  sync_strategy: repair_fields
  conflict_policy: canonical_wins
  fields:
    remove_lines:
    - .agents/skills/
    - .agents/standards/
    - .agents/agents/
    - .agents/prompts/
    ensure_lines:
    - .claude/skills/
    - .claude/worktrees/
  tags:
  - gitignore
  - consumer
  - fleet-policy
- name: marketplace-agents-gitignore-profile
  description: Marketplace repos keep .agents install destinations untracked because
    their source content lives in top-level skills, standards, agents, and prompts.
  target_kind: gitignore_patch
  target_path: .gitignore
  profiles:
  - marketplace
  sync_strategy: repair_fields
  conflict_policy: canonical_wins
  fields:
    ensure_lines:
    - .claude/skills/
    - .claude/worktrees/
    - .agents/skills/
    - .agents/standards/
    - .agents/agents/
    - .agents/prompts/
  tags:
  - gitignore
  - marketplace
  - fleet-policy

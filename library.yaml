  agents:
    - name: architecture-scout
      description: >-
        Read-only haiku agent that scans docs/adr/, vision.md, and packages/**/CLAUDE.md
        to produce a Coverage-Matrix report (Contract x Package x ADR/Helper/Proactive/Reactive)
        before /plan and /epic-init. Detects missing ADRs, hoist-debt, and pre-trinity packages.
        Returns structured JSON + human-readable Markdown.
      source: https://github.com/cognovis/library-core/blob/main/agents/architecture-scout.md
      requires: []
      tags:
        - origin:original
        - tier:domain
    - name: bead-orchestrator
      description: >-
        Autonomous orchestrator for single-bead implementation. Runs Phase 0-16: sizing/claim,
        context, implementation (Sonnet), review (Opus, 1 fix cycle), Codex adversarial,
        verification (Opus VETO), MoC, UAT, constraints, changelog, session-close.
        Does NOT close beads — session-close handles closing after merge+push.
      source: https://github.com/cognovis/library-core/blob/main/agents/bead-orchestrator.md
      requires:
        - "mcp:open-brain"
        - "skill:beads"
      tags:
        - origin:original
        - tier:core
    - name: chrome-devtools-tester
      description: >-
        Execute browser tests using agent-browser CLI: UI testing, form interaction, visual
        verification. Use after writing browser test code or when troubleshooting browser-based tests.
      source: https://github.com/cognovis/library-core/blob/main/agents/chrome-devtools-tester.md
      tags:
        - origin:original
        - tier:domain
    - name: ci-monitor
      description: >-
        Watches GitHub Actions CI pipeline for a specific pushed commit. Blocks silently until
        pipeline completes. Handles parallel session-closes by filtering on commit SHA.
        Returns a single structured verdict line.
      source: https://github.com/cognovis/library-core/blob/main/agents/ci-monitor.md
      requires:
        - "skill:session-close"
      tags:
        - origin:original
        - tier:domain
    - name: constraint-checker
      description: >-
        Verifies SLOs, security defaults, and performance constraints against a built artifact.
        Use proactively after holdout validation to check non-functional requirements.
        Read-only and execute-only: never modifies code.
      source: https://github.com/cognovis/library-core/blob/main/agents/constraint-checker.md
      tags:
        - origin:original
        - tier:domain
    - name: doc-changelog-updater
      description: >-
        Analyzes branch changes and updates documentation and changelog files. Use after
        implementing features or when user requests documentation updates or changelog entries.
        Detects changes in current branch via git diff.
      source: https://github.com/cognovis/library-core/blob/main/agents/doc-changelog-updater.md
      requires:
        - "mcp:open-brain"
      tags:
        - origin:original
        - tier:domain
    - name: feature-doc-updater
      description: >-
        Updates feature documentation across 5 doc layers after bead implementation. Reads
        project-local .claude/doc-config.yml for targets and routing. Two modes: draft
        (pre-dev) and verify (post-dev).
      source: https://github.com/cognovis/library-core/blob/main/agents/feature-doc-updater.md
      tags:
        - origin:original
        - tier:domain
    - name: holdout-validator
      description: >-
        Runs holdout scenarios from tests/holdout/ against a built artifact. Use proactively
        after implementer completes the Green phase. Read-only and execute-only: never modifies code.
      source: https://github.com/cognovis/library-core/blob/main/agents/holdout-validator.md
      tags:
        - origin:original
        - tier:domain
    - name: implementer
      description: >-
        Develops production code to make existing failing unit tests pass (Green phase of TDD).
        Use after test-author completes the Red phase. Reads test files only.
      source: https://github.com/cognovis/library-core/blob/main/agents/implementer.md
      tags:
        - origin:original
        - tier:domain
    - name: integration-test-runner
      description: >-
        Autonomous agent that analyzes code changes, determines appropriate test targets, and
        executes integration tests to validate user-facing behavior.
      source: https://github.com/cognovis/library-core/blob/main/agents/integration-test-runner.md
      requires:
        - "mcp:open-brain"
      tags:
        - origin:original
        - tier:domain
    - name: learning-extractor
      description: >-
        Extracts learnings and session insights from conversation history and project context.
      source: https://github.com/cognovis/library-core/blob/main/agents/learning-extractor.md
      tags:
        - origin:original
        - tier:domain
    - name: pester-test-engineer
      description: >-
        Expert Pester test engineer for Charly Server PowerShell unit testing. Writes and reviews
        Pester test cases with proper mocking, executes test runs on Windows servers, debugs test
        failures systematically.
      source: https://github.com/cognovis/library-core/blob/main/agents/pester-test-engineer.md
      tags:
        - origin:original
        - tier:project
    - name: plan-reviewer
      description: >-
        Independent reviewer for implementation plans. Provides a second perspective on plans,
        identifying missing requirements, edge cases, and technical concerns.
      source: https://github.com/cognovis/library-core/blob/main/agents/plan-reviewer.md
      tags:
        - origin:original
        - tier:domain
    - name: playwright-tester
      description: >-
        Executes a single bounded Playwright browser test scenario using playwright-cli.
        Receives a specific test scenario, runs it step-by-step, and returns a structured
        pass/fail report with screenshot evidence.
      source: https://github.com/cognovis/library-core/blob/main/agents/playwright-tester.md
      tags:
        - origin:original
        - tier:domain
    - name: prd-generator
      description: >-
        Generates type-specific PRDs (Product Requirements Documents) from scout analysis.
      source: https://github.com/cognovis/library-core/blob/main/agents/prd-generator.md
      tags:
        - origin:original
        - tier:domain
    - name: quick-fix
      description: >-
        Lightweight orchestrator for XS/micro beads (bugs, chores, tasks). Claims bead, spawns
        Sonnet implementer, triggers Codex review, handles fix loop (max 2 iterations), then
        hands off to session-close.
      source: https://github.com/cognovis/library-core/blob/main/agents/quick-fix.md
      requires:
        - "agent:review-agent"
        - "agent:session-close"
        - "skill:factory-check"
        - "skill:beads"
      tags:
        - origin:original
        - tier:core
    - name: researcher
      description: >-
        Web research agent that uses SearXNG for search and summarize skill for deep content
        extraction. Returns structured research summaries.
      source: https://github.com/cognovis/library-core/blob/main/agents/researcher.md
      tags:
        - origin:original
        - tier:domain
    - name: review-agent
      description: >-
        Post-implementation code reviewer for bead workflows. Reads git diff, checks code quality,
        verifies MoC coverage, and validates acceptance criteria. Returns structured CLEAN or
        FINDINGS report.
      source: https://github.com/cognovis/library-core/blob/main/agents/review-agent.md
      requires:
        - "skill:beads"
      tags:
        - origin:original
        - tier:domain
    - name: session-close
      description: >-
        Orchestrates a full session close with double-merge strategy for parallel safety. Commits,
        generates changelog, version tags, extracts learnings, saves session summary, and pushes.
        Use when ending a session or releasing. Triggers on session-close, session close, release.
      source: https://github.com/cognovis/library-core/blob/main/agents/session-close.md
      requires:
        - "mcp:open-brain"
        - "skill:session-close"
        - "skill:beads"
      tags:
        - origin:original
        - tier:core
    - name: test-author
      description: >-
        Writes TDD tests from spec intent and acceptance criteria. Use when a bead's acceptance
        criteria must be translated into failing unit tests BEFORE implementation begins (Red phase).
      source: https://github.com/cognovis/library-core/blob/main/agents/test-author.md
      tags:
        - origin:original
        - tier:domain
        - tier:domain
    - name: test-engineer
      description: >-
        Framework-agnostic test engineer that writes, reviews, and executes unit tests.
        Detects the project's test framework automatically and applies appropriate patterns.
      source: https://github.com/cognovis/library-core/blob/main/agents/test-engineer.md
      requires:
        - "mcp:open-brain"
      tags:
        - origin:original
        - tier:domain
    - name: uat-validator
      description: >-
        Runs user acceptance tests against a deployed artifact from an external-user perspective.
        Use after implementer completes a feature (PAUL mode only). Information barrier: must NOT
        access source code, unit tests, or implementation history.
      source: https://github.com/cognovis/library-core/blob/main/agents/uat-validator.md
      tags:
        - origin:original
        - tier:domain
    - name: verification-agent
      description: >-
        Independent verification of implementation claims. Spawned after implementation to verify
        that completion reports are accurate, tests actually pass, and acceptance criteria are
        genuinely met. Read-only except for running tests.
      source: https://github.com/cognovis/library-core/blob/main/agents/verification-agent.md
      requires:
        - "skill:beads"
      tags:
        - origin:original
        - tier:domain
    - name: wave-monitor
      description: >-
        Long-lived Haiku subagent that polls wave completion status on behalf of the
        wave-orchestrator. Returns a structured JSON verdict when the wave reaches a terminal state.
      source: https://github.com/cognovis/library-core/blob/main/agents/wave-monitor.md
      requires:
        - "skill:beads"
      tags:
        - origin:original
        - tier:domain
    - name: wave-orchestrator
      description: >-
        Orchestrate parallel implementation of multiple beads across cmux panes in
        dependency-aware waves. Use when implementing a whole feature area or dispatching
        multiple beads at once.
      source: https://github.com/cognovis/library-core/blob/main/agents/wave-orchestrator.md
      requires:
        - agent:wave-monitor
        - agent:bead-orchestrator
        - agent:quick-fix
        - skill:wave-dispatch
        - skill:wave-reviewer
        - skill:factory-check
      tags:
        - origin:original
        - tier:domain

    source: https://github.com/cognovis/library/blob/main/skills/script-forge/SKILL.md
    requires:
    - standard:agentic-primitives
    - standard:primitive-placement
    - standard:english-only
    - standard:no-emoji
    scripts:
    - path: scripts/init-script.py
      role: entrypoint
      entrypoint: true
      language: python
      output_contract: bare-value
    metadata:
      library:
        plane: dev
        steward: library-platform
        gascity:
          exportable: false
    tags:
    - origin:original
    - tier:domain
  - name: standard-forge
    description: Scaffold a new Library standard — a factual, harness-injected markdown
